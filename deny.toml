# cargo-deny configuration (v2 format)

[graph]
targets = []
all-features = true

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-voice"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-types"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-telemetry"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-db"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-security"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-git = ["https://github.com/Roberdan/convergio-sdk"]
